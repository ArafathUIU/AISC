name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install shared libraries
        run: |
          pip install -e libs/aisc-models -e libs/aisc-utils -e libs/aisc-events -e libs/aisc-proto -e libs/aisc-scoring \
            -e services/auth-service -e services/memory-service \
            -e services/agent-runtime -e services/orchestrator-service
      - name: Run ruff
        run: |
          pip install ruff
          ruff check libs/ services/
      - name: Run mypy
        run: |
          pip install mypy
          mypy libs/ services/ --ignore-missing-imports || echo "No typed code to check yet."

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aisc_test
          POSTGRES_USER: aisc
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -e libs/aisc-models -e libs/aisc-utils -e libs/aisc-events -e libs/aisc-proto -e libs/aisc-scoring \
            -e services/auth-service -e services/memory-service \
            -e services/agent-runtime -e services/orchestrator-service \
            pytest pytest-asyncio pytest-cov
      - name: Run tests
        run: pytest services/ libs/ -v --tb=short

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose
        run: docker compose config --quiet
      - name: Test Dockerfile builds
        run: |
          for svc in auth-service memory-service; do
            if [ -f "services/$svc/Dockerfile" ]; then
              docker build -t "aisc/$svc:ci" -f "services/$svc/Dockerfile" .
            fi
          done
