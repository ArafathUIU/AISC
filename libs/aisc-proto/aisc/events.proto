syntax = "proto3";

package aisc.events;

// --- Standard Event Envelope ---

message EventEnvelope {
  string event_id = 1;
  string event_type = 2;
  string timestamp = 3;
  string source_service = 4;
  string source_agent = 5;
  string correlation_id = 6;
  string project_id = 7;
  string task_id = 8;
  bytes payload = 9;
  string version = 10;
}

// --- Project Events ---

message ProjectCreatedPayload {
  string project_id = 1;
  string name = 2;
  string owner_id = 3;
  string config_json = 4;
  string created_by = 5;
}

message ProjectUpdatedPayload {
  string project_id = 1;
  string changes_json = 2;
  string updated_by = 3;
}

message ProjectArchivedPayload {
  string project_id = 1;
  string reason = 2;
  string archived_by = 3;
}

// --- Workflow Events ---

message WorkflowStartedPayload {
  string workflow_id = 1;
  string project_id = 2;
  int32 total_nodes = 3;
  repeated string agent_types_involved = 4;
}

message WorkflowNodeCompletedPayload {
  string workflow_id = 1;
  string node_id = 2;
  string task_id = 3;
  string agent_type = 4;
  repeated string artifacts_produced = 5;
  int64 duration_ms = 6;
}

message WorkflowCompletedPayload {
  string workflow_id = 1;
  string project_id = 2;
  int32 total_tasks = 3;
  int32 total_iterations = 4;
  int64 total_tokens = 5;
  int64 duration_ms = 6;
}

message WorkflowFailedPayload {
  string workflow_id = 1;
  string failed_node_id = 2;
  string failed_task_id = 3;
  string error = 4;
  string escalation_id = 5;
}

// --- Task Events ---

message TaskCreatedPayload {
  string task_id = 1;
  string project_id = 2;
  string task_type = 3;
  string assigned_agent_type = 4;
  int32 priority = 5;
  string input_json = 6;
  repeated string dependencies = 7;
}

message TaskAssignedPayload {
  string task_id = 1;
  string agent_id = 2;
  string agent_type = 3;
  int64 queue_wait_ms = 4;
}

message TaskStartedPayload {
  string task_id = 1;
  string agent_id = 2;
  string agent_type = 3;
}

message TaskCompletedPayload {
  string task_id = 1;
  string agent_id = 2;
  repeated string artifact_ids = 3;
  int64 tokens_used = 4;
  string llm_model = 5;
  int64 duration_ms = 6;
}

message TaskFailedPayload {
  string task_id = 1;
  string agent_id = 2;
  string error = 3;
  string error_type = 4;
  int32 retry_count = 5;
  int64 tokens_consumed_before_failure = 6;
}

// --- Artifact Events ---

message ArtifactDraftCreatedPayload {
  string artifact_id = 1;
  string project_id = 2;
  string task_id = 3;
  string type = 4;
  string format = 5;
  string created_by_agent = 6;
  int32 version = 7;
}

message ArtifactScoredPayload {
  string artifact_id = 1;
  string gate_type = 2;
  int32 iteration = 3;
  double aggregate_score = 4;
  string metric_scores_json = 5;
  bool passed = 6;
}

message ArtifactApprovedPayload {
  string artifact_id = 1;
  string gate_type = 2;
  double score = 3;
  int32 iterations_taken = 4;
}

message ArtifactRejectedPayload {
  string artifact_id = 1;
  string gate_type = 2;
  double score = 3;
  int32 iteration = 4;
  repeated string failing_metrics = 5;
  string reason = 6;
}

// --- Quality Events ---

message QualityGateEvaluatedPayload {
  string artifact_id = 1;
  string gate_type = 2;
  int32 iteration = 3;
  double score = 4;
  bool passed = 5;
}

message QualityGatePassedPayload {
  string artifact_id = 1;
  string gate_type = 2;
  double score = 3;
  int32 iterations = 4;
}

message QualityGateFailedPayload {
  string artifact_id = 1;
  string gate_type = 2;
  double final_score = 3;
  bool max_iterations_reached = 4;
  int32 iterations_exhausted = 5;
  string escalation_id = 6;
}

message RecursiveLoopStartedPayload {
  string artifact_id = 1;
  string gate_type = 2;
  int32 max_iterations = 3;
  double threshold = 4;
}

message RecursiveLoopIterationPayload {
  string artifact_id = 1;
  string gate_type = 2;
  int32 iteration = 3;
  double score = 4;
  double score_delta = 5;
  bool improving = 6;
}

message RecursiveLoopCompletedPayload {
  string artifact_id = 1;
  string gate_type = 2;
  int32 total_iterations = 3;
  double final_score = 4;
  bool passed = 5;
  repeated double score_progression = 6;
}

// --- Deployment Events ---

message DeploymentRequestedPayload {
  string project_id = 1;
  repeated string service_names = 2;
  string environment = 3;
  string strategy = 4;
  repeated string artifact_ids = 5;
}

message DeploymentCompletedPayload {
  string deployment_id = 1;
  string environment = 2;
  repeated string services_deployed = 3;
  bool canary_promoted = 4;
  int64 duration_ms = 5;
}

message DeploymentFailedPayload {
  string deployment_id = 1;
  string error = 2;
  string error_type = 3;
}

message RollbackCompletedPayload {
  string deployment_id = 1;
  string rollback_to_version = 2;
  string reason = 3;
  int64 duration_ms = 4;
}

// --- Monitoring Events ---

message MetricAnomalyDetectedPayload {
  string service_name = 1;
  string metric = 2;
  double current_value = 3;
  double baseline_value = 4;
  double deviation_sigma = 5;
  string detected_at = 6;
}

message AlertTriggeredPayload {
  string alert_id = 1;
  string severity = 2;
  string title = 3;
  string service_name = 4;
  string metric = 5;
  repeated string suggested_actions = 6;
}

message FailureDetectedPayload {
  string service_name = 1;
  string failure_type = 2;
  double error_rate = 3;
  string started_at = 4;
  repeated string trace_ids = 5;
}

// --- Learning Events ---

message IterationRecordedPayload {
  string artifact_type = 1;
  string gate_type = 2;
  string agent_type = 3;
  int32 iteration = 4;
  double score = 5;
  bool passed = 6;
  int64 tokens_used = 7;
  string model = 8;
}

message KnowledgeExtractedPayload {
  string pattern_id = 1;
  string pattern_type = 2;
  string description = 3;
  double confidence = 4;
  int32 support_count = 5;
  repeated string applicable_agents = 6;
}

message PromptOptimizedPayload {
  string agent_type = 1;
  string prompt_file = 2;
  string prompt_version = 3;
  string changes = 4;
}

// --- System Events ---

message AgentStatusChangedPayload {
  string agent_id = 1;
  string agent_type = 2;
  string previous_status = 3;
  string new_status = 4;
  string task_id = 5;
}

message EscalationCreatedPayload {
  string escalation_id = 1;
  string type = 2;
  string severity = 3;
  string target_role = 4;
  string artifact_id = 5;
  string timeout = 6;
}
